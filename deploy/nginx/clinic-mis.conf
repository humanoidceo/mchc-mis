server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 195.35.20.176 srv1789397.hstgr.cloud _;

    access_log /var/log/nginx/clinic-mis.access.log;
    error_log /var/log/nginx/clinic-mis.error.log;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        alias /var/www/mchc-mis/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /media/ {
        alias /var/www/mchc-mis/backend/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /assets/ {
        alias /var/www/mchc-mis/frontend/frontend/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.svg {
        alias /var/www/mchc-mis/frontend/frontend/dist/favicon.svg;
        access_log off;
    }

    location = /icons.svg {
        alias /var/www/mchc-mis/frontend/frontend/dist/icons.svg;
        access_log off;
    }

    location / {
        root /var/www/mchc-mis/frontend/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
